# Cloudflare Pages 部署配置
# 在 Cloudflare Pages 控制台 → Settings → Build configuration 中填入

[build]
  command = "npm run build && npx next-sitemap"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# 环境变量（在 CF Pages 控制台 → Settings → Environment variables 中设置）
# NOTION_API_KEY        = secret_xxxx
# NOTION_DATABASE_ID    = xxxx
# NEXT_PUBLIC_SITE_URL  = https://yourdomain.com
# NEXT_PUBLIC_SITE_NAME = AI工具导航
